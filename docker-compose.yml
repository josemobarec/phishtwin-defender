version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    container_name: phishtwin-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: phishtwin-db
    environment:
      POSTGRES_DB: phishtwin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: